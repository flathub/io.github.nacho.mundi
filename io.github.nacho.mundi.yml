app-id: io.github.nacho.mundi
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: mundi
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_NET_OFFLINE: 'true'
    CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
modules:
  - name: mundi
    buildsystem: meson
    sources:
      - type: git
        url: https://github.com/nacho/mundi.git
        commit: 3188e11df74de9958dbb917dad9ae7c42e3de2c6
      # cargo-sources.json needs to be placed before the
      # copying, otherwise the config will just be empty
      - cargo-sources.json
      - type: shell
        commands:
          - mkdir -p .cargo
          - cp cargo/config .cargo/config.toml
